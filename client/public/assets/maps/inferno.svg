    <rect x="650" y="360" width="110" height="76" rx="7"/>
    <rect x="105" y="360" width="70" height="120" rx="5"/>
  </g>
  <text x="48" y="98" font-family="Arial Black, Arial" font-size="82" fill="#fff" opacity=".22" letter-spacing="4">INFERNO</text>
  <text x="55" y="508" font-family="Arial Black, Arial" font-size="36" fill="#ffb36a" opacity=".45" letter-spacing="4">arches · brick · fire</text>
